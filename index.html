<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ChitchatX</title>
<style>
:root{--bg:#0d0d0d;--bg2:#161616;--bg3:#1e1e1e;--bg4:#252525;--border:#2a2a2a;--purple:#7c3aed;--purple2:#6d28d9;--purple3:#a78bfa;--red:#ef4444;--green:#22c55e;--blue:#60a5fa;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:#fff;}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#333;border-radius:4px}

/* AUTH */
#authScreen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 60% 30%,#1a0a3a,#0d0d0d);padding:20px;z-index:1000;}
.acard{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:40px 32px;width:100%;max-width:380px;box-shadow:0 24px 80px #7c3aed18;}
.acard h1{font-size:26px;font-weight:800;background:linear-gradient(135deg,#fff,var(--purple3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.acard .sub{color:#666;font-size:14px;margin-bottom:24px;margin-top:4px;}
.inp{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;color:#fff;font-size:15px;outline:none;margin-bottom:10px;transition:border-color .2s;display:block;font-family:inherit;}
.inp:focus{border-color:var(--purple);}
.inp::placeholder{color:#555;}
.bmain{width:100%;background:linear-gradient(135deg,var(--purple),#5b21b6);border:none;color:#fff;padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;transition:opacity .2s;}
.bmain:hover{opacity:.9;}
.aerr{color:#f87171;font-size:13px;min-height:18px;margin:2px 0 8px;text-align:center;}
.aok{color:var(--green);font-size:13px;min-height:18px;margin:2px 0 8px;text-align:center;}
.divider{display:flex;align-items:center;gap:10px;margin:12px 0;}
.divider div{flex:1;height:1px;background:var(--border);}
.divider span{color:#555;font-size:12px;}
.bfb{width:100%;background:#1877f2;border:none;color:#fff;padding:13px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;}
.bfb:hover{opacity:.9;}
.aswitch{color:#666;font-size:13px;margin-top:16px;text-align:center;}
.aswitch span{color:var(--purple3);cursor:pointer;font-weight:600;}

/* APP */
#appScreen{display:none;position:fixed;inset:0;background:var(--bg);align-items:stretch;justify-content:stretch;padding:0;box-sizing:border-box;}
.appcard{width:100%;height:100%;display:flex;background:var(--bg);}
.appwrap{display:flex;height:100%;width:100%;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:300px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .25s;}
.sbhead{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.myav{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--purple),#5b21b6);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;}
.mynm{font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ibtn{background:none;border:none;color:#666;cursor:pointer;font-size:18px;padding:6px;border-radius:8px;transition:all .15s;}
.ibtn:hover{background:var(--bg4);color:#fff;}
.searchwrap{padding:10px 14px;border-bottom:1px solid var(--border);}
.sbox{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;}
.sbox input{background:none;border:none;color:#fff;font-size:14px;outline:none;flex:1;font-family:inherit;}
.sbox input::placeholder{color:#555;}
.tabs{display:flex;padding:8px 14px 0;gap:6px;}
.tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;color:#555;cursor:pointer;border-radius:8px;border:none;background:none;transition:all .15s;}
.tab.on{background:var(--purple)22;color:var(--purple3);}
.newbtn{margin:10px 14px;padding:11px;background:var(--purple)18;border:1.5px dashed #7c3aed88;color:var(--purple3);border-radius:12px;cursor:pointer;text-align:center;font-size:13px;font-weight:600;transition:background .15s;}
.newbtn:hover{background:var(--purple)28;}
.clist{flex:1;overflow-y:auto;padding:4px 0;}
.citem{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-radius:10px;margin:1px 6px;transition:background .15s;}
.citem:hover{background:var(--bg3);}
.citem.on{background:var(--purple)18;}
.cav{width:44px;height:44px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;}
.cav.grp{border-radius:12px;font-size:20px;}
.cinfo{flex:1;min-width:0;}
.cnm{font-size:14px;font-weight:600;margin-bottom:2px;}
.cprev{font-size:12px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ctm{font-size:11px;color:#555;flex-shrink:0;}

/* CHAT */
.chatarea{flex:1;display:flex;flex-direction:column;background:var(--bg);min-width:0;position:relative;}
.chatheader{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--bg2);flex-shrink:0;}
.hav{width:36px;height:36px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
.hav.grp{border-radius:10px;font-size:18px;}
.hnm{font-size:15px;font-weight:700;}
.hsub{font-size:11px;color:#555;margin-top:1px;}
.backbtn{display:none;background:none;border:none;color:#aaa;cursor:pointer;font-size:24px;padding:2px 8px 2px 0;line-height:1;}
.emptychat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#444;gap:10px;}
.emptychat .eicon{font-size:52px;}
.emptychat h3{font-size:18px;color:#666;font-weight:700;}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:3px;}
.daysep{text-align:center;font-size:11px;color:#444;margin:10px 0;}
.mrow{display:flex;align-items:flex-end;gap:8px;padding:1px 0;}
.mrow.me{flex-direction:row-reverse;}
.mwrap{display:flex;flex-direction:column;max-width:min(70%,560px);}
.mrow.me .mwrap{align-items:flex-end;}
.bubble{padding:9px 13px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;cursor:pointer;}
.mrow.them .bubble{background:var(--bg4);border-bottom-left-radius:4px;}
.mrow.me .bubble{background:var(--purple);border-bottom-right-radius:4px;}
.bubble.del{background:var(--bg3)!important;color:#555;font-style:italic;border:1px dashed var(--border);cursor:default;font-size:13px;}
.msender{font-size:11px;color:var(--purple3);margin-bottom:3px;font-weight:600;}
.mmeta{display:flex;align-items:center;gap:4px;margin-top:3px;}
.mrow.me .mmeta{justify-content:flex-end;}
.mtime{font-size:10px;color:#555;}
.tick{font-size:11px;}
.tgrey{color:#888;}
.tblue{color:var(--blue);}
.tclk{color:#555;font-size:10px;}

/* VOICE */
.vbubble{display:flex;align-items:center;gap:10px;min-width:180px;}
.playbtn{background:#ffffff22;border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.vbar{flex:1;height:3px;background:#ffffff33;border-radius:2px;cursor:pointer;}
.vprog{height:100%;background:#fff;border-radius:2px;width:0%;transition:width .1s;}
.vdur{font-size:11px;color:#ffffff88;flex-shrink:0;}

/* INPUT */
.inputwrap{padding:12px 16px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0;}
.editbar{background:#1e1a2e;border-radius:10px;padding:8px 14px;margin-bottom:8px;display:none;align-items:center;gap:8px;font-size:13px;color:var(--purple3);}
.editbar button{background:none;border:none;color:#666;cursor:pointer;margin-left:auto;font-size:18px;}
.inprow{display:flex;align-items:flex-end;gap:8px;}
.msginp{flex:1;background:var(--bg3);border:1.5px solid var(--border);border-radius:22px;padding:10px 16px;color:#fff;font-size:14px;outline:none;font-family:inherit;resize:none;max-height:120px;min-height:42px;line-height:1.5;transition:border-color .2s;}
.msginp:focus{border-color:var(--purple);}
.msginp::placeholder{color:#555;}
.sendbtn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--purple),#5b21b6);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.sendbtn:active{transform:scale(.93);}
.voicebtn{width:42px;height:42px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--border);color:#aaa;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:all .15s;}
.voicebtn.rec{background:var(--red);border-color:var(--red);color:#fff;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* MODALS */
.overlay{position:fixed;inset:0;background:#000c;display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;}
.mbox{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:360px;box-shadow:0 20px 60px #0008;}
.mbox h3{font-size:18px;font-weight:700;margin-bottom:16px;}
.merr{color:#f87171;font-size:13px;min-height:18px;margin-top:6px;}
.mbtns{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
.mbtns button{flex:1;min-width:90px;padding:11px;border-radius:10px;font-size:14px;cursor:pointer;border:none;font-weight:600;}
.bgrey{background:var(--bg4);color:#aaa;}
.bpurp{background:var(--purple);color:#fff;}
.bred{background:var(--red);color:#fff;}
#tagwrap{display:flex;flex-wrap:wrap;min-height:36px;background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;padding:6px 10px;margin-bottom:10px;gap:4px;}
.tag{display:inline-flex;align-items:center;gap:6px;background:var(--purple)22;color:var(--purple3);border-radius:8px;padding:4px 10px;font-size:13px;}
.tag button{background:none;border:none;cursor:pointer;color:inherit;font-size:14px;padding:0;}

/* CTX */
.ctx{position:fixed;background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:6px;z-index:999;min-width:190px;box-shadow:0 10px 40px #000a;animation:pop .12s ease;}
@keyframes pop{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
.ctxit{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:9px;cursor:pointer;font-size:14px;transition:background .12s;}
.ctxit:hover{background:var(--bg4);}
.ctxit.red{color:#f87171;}
.ctxit.red:hover{background:#f8717118;}

/* TABLET */
@media(min-width:641px) and (max-width:1023px){
  .sidebar{width:260px;}
}

/* DESKTOP — center the app in a card with margins, like a native desktop chat app */
@media(min-width:1024px){
  #appScreen{align-items:center;justify-content:center;padding:28px;background:radial-gradient(ellipse at 50% 30%,#1a0a3a,#050505);}
  .appcard{max-width:1400px;max-height:920px;border-radius:18px;overflow:hidden;border:1px solid var(--border);box-shadow:0 30px 90px #000a;}
  .sidebar{width:330px;}
}
@media(min-width:1600px){
  .appcard{max-width:1560px;}
  .sidebar{width:360px;}
}

/* MOBILE */
@media(max-width:640px){
  #appScreen{padding:0;background:var(--bg);}
  .appcard{border-radius:0;box-shadow:none;}
  .sidebar{position:fixed;inset:0;width:100%;z-index:100;}
  .sidebar.hide{transform:translateX(-100%);}
  .chatarea{position:fixed;inset:0;}
  .backbtn{display:flex!important;}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authScreen">
  <div class="acard">
    <img src="https://anythinghub.github.io/ChitchatX/ChatGPT%20Image%20Jun%2015%2C%202026%2C%2001_03_53%20AM.png" style="width:80px;height:80px;border-radius:20px;margin-bottom:8px;object-fit:cover" onerror="this.style.display='none'">
    <h1>ChitchatX</h1>
    <p class="sub" id="asub">Sign in to chat with friends</p>
    <input class="inp" id="aname" type="text" placeholder="Your display name" autocomplete="name" style="display:none">
    <input class="inp" id="aemail" type="email" placeholder="Email address" autocomplete="email">
    <input class="inp" id="apass" type="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAuth()">
    <p id="amsg" class="aerr"></p>
    <button class="bmain" onclick="doAuth()" id="abtn">Sign In</button>
    <div class="divider"><div></div><span>or continue with</span><div></div></div>
    <button class="bfb" onclick="signInFB()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      Continue with Facebook
    </button>
    <div class="aswitch" id="aswitch">Don't have an account? <span onclick="toggleMode()">Sign Up</span></div>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <div class="appcard">
  <div class="appwrap">
    <div class="sidebar" id="sidebar">
      <div class="sbhead">
        <div class="myav" id="myav">?</div>
        <div class="mynm" id="mynm">...</div>
        <button class="ibtn" onclick="openNewGroup()" title="New Group">👥</button>
        <button class="ibtn" onclick="doLogout()" title="Logout">🚪</button>
      </div>
      <div class="searchwrap">
        <div class="sbox">
          <span style="color:#555">🔍</span>
          <input id="sinp" placeholder="Search chats..." oninput="filterList()">
        </div>
      </div>
      <div class="tabs">
        <button class="tab on" id="tdm" onclick="switchTab('dm')">💬 Chats</button>
        <button class="tab" id="tgrp" onclick="switchTab('grp')">👥 Groups</button>
      </div>
      <div class="newbtn" id="newbtn" onclick="openNewChat()">＋ New Conversation</div>
      <div class="clist" id="clist"></div>
    </div>
    <div class="chatarea" id="chatarea">
      <div class="emptychat">
        <img src="https://anythinghub.github.io/ChitchatX/ChatGPT%20Image%20Jun%2015%2C%202026%2C%2001_03_53%20AM.png" style="width:70px;height:70px;border-radius:18px;object-fit:cover" onerror="this.style.display='none'">
        <h3>ChitchatX</h3>
        <p style="font-size:14px;color:#444">Select a chat or start a new one</p>
      </div>
    </div>
  </div>
  </div>
</div>

<!-- NEW DM -->
<div class="overlay" id="dmModal" style="display:none">
  <div class="mbox">
    <h3>💬 New Conversation</h3>
    <input class="inp" id="dmEmail" type="email" placeholder="Friend's email" onkeydown="if(event.key==='Enter')startDM()">
    <p class="merr" id="dmerr"></p>
    <div class="mbtns">
      <button class="bgrey" onclick="hide('dmModal')">Cancel</button>
      <button class="bpurp" onclick="startDM()">Start Chat</button>
    </div>
  </div>
</div>

<!-- NEW GROUP -->
<div class="overlay" id="grpModal" style="display:none">
  <div class="mbox">
    <h3>👥 New Group</h3>
    <input class="inp" id="gname" placeholder="Group name">
    <div id="tagwrap"></div>
    <input class="inp" id="gemail" type="email" placeholder="Add member by email" onkeydown="if(event.key==='Enter')addMember()">
    <p class="merr" id="gerr"></p>
    <div class="mbtns">
      <button class="bgrey" onclick="hide('grpModal')">Cancel</button>
      <button class="bpurp" onclick="createGrp()">Create</button>
    </div>
  </div>
</div>

<!-- DELETE -->
<div class="overlay" id="delModal" style="display:none">
  <div class="mbox">
    <h3>🗑️ Delete Message</h3>
    <div class="mbtns" style="flex-direction:column;gap:8px;margin-top:8px">
      <button class="bred" onclick="doDelete('all')" style="padding:13px">🌐 Delete for Everyone</button>
      <button class="bgrey" onclick="doDelete('me')" style="padding:13px">🙈 Delete for Me Only</button>
      <button class="bgrey" onclick="hide('delModal')" style="padding:13px">Cancel</button>
    </div>
  </div>
</div>

<!-- CTX -->
<div class="ctx" id="ctx" style="display:none">
  <div class="ctxit" onclick="ctxdo('edit')">✏️ &nbsp;Edit Message</div>
  <div class="ctxit red" onclick="ctxdo('delete')">🗑️ &nbsp;Delete Message</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SBURL = "https://mqomxdvydrnnvvkkabtz.supabase.co";
const SBKEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xb214ZHZ5ZHJubnZ2a2thYnR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjI1MzksImV4cCI6MjA5Njk5ODUzOX0.TMh3pjoVeQ0U14mhwbE_-9YHnS3t2_kSd6ThJ3t1A2M";
const APPURL = "https://anythinghub.github.io/ChitchatX/";
const sb = supabase.createClient(SBURL, SBKEY, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true, storageKey: 'chitchatx-auth' }
});

// STATE
let ME=null, PROF=null, CID=null, CTYPE=null;
let msgsub=null, poll=null, tab='dm';
let ctxId=null, ctxTxt=null, editId=null, delId=null;
let convos=[], groups=[], grpMems=[];
let mrec=null, isRec=false, rchunks=[];
let appReady = false;

// ── INIT: check session first ────────────────────────────
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    await boot(session.user);
  }
  // listen for future changes
  sb.auth.onAuthStateChange(async (evt, session) => {
    if (evt === 'SIGNED_IN' && session && !appReady) {
      await boot(session.user);
    }
    if (evt === 'SIGNED_OUT') {
      appReady = false;
      ME = null; PROF = null; CID = null;
      if (poll) clearInterval(poll);
      if (msgsub) { sb.removeChannel(msgsub); msgsub = null; }
      document.getElementById("authScreen").style.display = "flex";
      document.getElementById("appScreen").style.display = "none";
    }
  });
})();

// ── BOOT ────────────────────────────────────────────────
async function boot(user) {
  if (appReady) return;
  appReady = true;
  ME = user;
  let { data: prof } = await sb.from("users").select("*").eq("id", user.id).single();
  if (!prof) {
    const name = user.user_metadata?.full_name || user.user_metadata?.name || (user.email||'').split('@')[0] || 'User';
    const email = user.email || '';
    await sb.from("users").upsert({ id: user.id, email, name }, { onConflict: 'id' });
    ({ data: prof } = await sb.from("users").select("*").eq("id", user.id).single());
  }
  PROF = prof || { name: user.email, email: user.email };
  document.getElementById("authScreen").style.display = "none";
  document.getElementById("appScreen").style.display = "flex";
  const init = (PROF.name||'??').slice(0,2).toUpperCase();
  document.getElementById("myav").textContent = init;
  document.getElementById("mynm").textContent = PROF.name;
  await loadAll();
  startPoll();
}

// ── AUTH ────────────────────────────────────────────────
let isUp = false;
window.toggleMode = () => {
  isUp = !isUp;
  document.getElementById("aname").style.display = isUp ? "block" : "none";
  document.getElementById("abtn").textContent = isUp ? "Create Account" : "Sign In";
  document.getElementById("asub").textContent = isUp ? "Create your account" : "Sign in to chat with friends";
  document.getElementById("aswitch").innerHTML = isUp
    ? 'Already have an account? <span onclick="toggleMode()">Sign In</span>'
    : "Don't have an account? <span onclick='toggleMode()'>Sign Up</span>";
  document.getElementById("amsg").textContent = "";
};

window.doAuth = async () => {
  const email = document.getElementById("aemail").value.trim();
  const pass  = document.getElementById("apass").value;
  const name  = document.getElementById("aname").value.trim();
  const msg   = document.getElementById("amsg");
  msg.className = "aerr"; msg.textContent = "";
  if (!email || !pass) { msg.textContent = "Please fill in all fields."; return; }

  if (isUp) {
    if (!name) { msg.textContent = "Enter your display name."; return; }
    msg.className = "aok"; msg.textContent = "Creating account...";
    const { data, error } = await sb.auth.signUp({ email, password: pass });
    if (error) { msg.className="aerr"; msg.textContent=error.message; return; }
    if (data?.user) {
      await sb.from("users").upsert({ id: data.user.id, email, name }, { onConflict: 'id' });
      msg.textContent = "Signing in...";
      const { error: e2 } = await sb.auth.signInWithPassword({ email, password: pass });
      if (e2) { msg.className="aerr"; msg.textContent=e2.message; return; }
      // boot will be called by onAuthStateChange
    }
  } else {
    msg.className = "aok"; msg.textContent = "Signing in...";
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) {
      msg.className = "aerr";
      if (error.message.includes("not confirmed")) {
        msg.textContent = "Email not confirmed. Go to Supabase → Auth → Users, delete this account, then sign up again.";
      } else if (error.message.toLowerCase().includes("invalid")) {
        msg.textContent = "Wrong email or password.";
      } else {
        msg.textContent = error.message;
      }
    }
  }
};

window.signInFB = async () => {
  const { error } = await sb.auth.signInWithOAuth({ provider: 'facebook', options: { redirectTo: APPURL } });
  if (error) alert(error.message);
};

window.doLogout = async () => {
  appReady = false;
  if (poll) clearInterval(poll);
  if (msgsub) { sb.removeChannel(msgsub); msgsub = null; }
  await sb.auth.signOut();
};

// ── LOAD CONVERSATIONS ──────────────────────────────────
async function loadAll() {
  await Promise.all([loadDMs(), loadGrps()]);
  renderList();
}

async function loadDMs() {
  const { data: mine } = await sb.from("conversation_members").select("conversation_id").eq("user_id", ME.id);
  if (!mine?.length) { convos=[]; return; }
  const ids = mine.map(c=>c.conversation_id);
  const { data: mems } = await sb.from("conversation_members")
    .select("conversation_id,user_id,users(name,email)").in("conversation_id",ids).neq("user_id",ME.id);
  const list=[];
  for (const id of ids) {
    const { data: lm } = await sb.from("messages").select("text,created_at,deleted_for_everyone,is_voice")
      .eq("conversation_id",id).is("group_id",null).order("created_at",{ascending:false}).limit(1);
    const mem = mems?.find(m=>m.conversation_id===id);
    if (!mem) continue;
    const m = lm?.[0];
    list.push({ id, type:'dm', name: mem.users?.name||mem.users?.email||"Unknown",
      preview: m?.deleted_for_everyone?"🚫 Deleted": m?.is_voice?"🎤 Voice msg": (m?.text||""), lastAt: m?.created_at||"" });
  }
  list.sort((a,b)=>new Date(b.lastAt)-new Date(a.lastAt));
  convos = list;
}

async function loadGrps() {
  const { data: mine } = await sb.from("group_members").select("group_id").eq("user_id", ME.id);
  if (!mine?.length) { groups=[]; return; }
  const ids = mine.map(g=>g.group_id);
  const { data: gs } = await sb.from("groups").select("*").in("id",ids);
  const list=[];
  for (const g of (gs||[])) {
    const { data: lm } = await sb.from("messages").select("text,created_at,deleted_for_everyone,is_voice")
      .eq("group_id",g.id).order("created_at",{ascending:false}).limit(1);
    const m = lm?.[0];
    list.push({ id:g.id, type:'grp', name:g.name,
      preview: m?.deleted_for_everyone?"🚫 Deleted": m?.is_voice?"🎤 Voice msg": (m?.text||""), lastAt: m?.created_at||"" });
  }
  list.sort((a,b)=>new Date(b.lastAt)-new Date(a.lastAt));
  groups = list;
}

let filterQ = "";
window.filterList = () => { filterQ = document.getElementById("sinp").value.toLowerCase(); renderList(); };

function renderList() {
  const src = tab==='dm' ? convos : groups;
  const filtered = filterQ ? src.filter(c=>c.name.toLowerCase().includes(filterQ)) : src;
  const el = document.getElementById("clist");
  if (!filtered.length) { el.innerHTML='<div style="padding:24px;text-align:center;color:#444;font-size:13px">Nothing here yet</div>'; return; }
  el.innerHTML = filtered.map(c => {
    const g = c.type==='grp';
    const t = c.lastAt ? ago(new Date(c.lastAt)) : '';
    return '<div class="citem'+(c.id===CID?' on':'')+'" onclick="openChat(\''+c.id+'\',\''+ea(c.name)+'\',\''+c.type+'\')">' +
      '<div class="cav'+(g?' grp':'')+'">'+( g?'👥':c.name.slice(0,2).toUpperCase() )+'</div>' +
      '<div class="cinfo"><div class="cnm">'+eh(c.name)+'</div><div class="cprev">'+eh(c.preview)+'</div></div>' +
      '<div class="ctm">'+t+'</div></div>';
  }).join('');
}

function switchTab(t) {
  tab=t;
  document.getElementById("tdm").classList.toggle("on",t==='dm');
  document.getElementById("tgrp").classList.toggle("on",t==='grp');
  document.getElementById("newbtn").textContent = t==='dm'?'＋ New Conversation':'＋ New Group';
  document.getElementById("newbtn").onclick = t==='dm'?openNewChat:openNewGroup;
  renderList();
}

// ── OPEN CHAT ───────────────────────────────────────────
window.openChat = async (cid, name, type) => {
  CID=cid; CTYPE=type; editId=null;
  if (msgsub) { sb.removeChannel(msgsub); msgsub=null; }
  document.getElementById("sidebar").classList.add("hide");
  const g = type==='grp';
  document.getElementById("chatarea").innerHTML =
    '<div class="chatheader">' +
      '<button class="backbtn" onclick="goBack()">‹</button>' +
      '<div class="hav'+(g?' grp':'')+'">'+( g?'👥':name.slice(0,2).toUpperCase() )+'</div>' +
      '<div><div class="hnm">'+eh(name)+'</div>'+(g?'<div class="hsub">Group chat</div>':'')+'</div>' +
    '</div>' +
    '<div class="msgs" id="msgs"></div>' +
    '<div class="inputwrap">' +
      '<div class="editbar" id="ebar"><span>✏️ Editing</span><button onclick="cancelEdit()">✕</button></div>' +
      '<div class="inprow">' +
        '<button class="voicebtn" id="vbtn" onclick="toggleRec()" title="Voice message">🎤</button>' +
        '<textarea class="msginp" id="minp" placeholder="Message…" rows="1" onkeydown="onK(event)" oninput="autoH(this)"></textarea>' +
        '<button class="sendbtn" id="sbtn" onclick="sendMsg()">➤</button>' +
      '</div>' +
    '</div>';
  document.getElementById("minp").focus();
  renderList();
  await markSeen(cid, type);
  await fetchMsgs(cid, type);
  const filter = type==='grp' ? 'group_id=eq.'+cid : 'conversation_id=eq.'+cid;
  msgsub = sb.channel('r'+cid)
    .on('postgres_changes',{event:'*',schema:'public',table:'messages',filter}, async()=>{
      await markSeen(cid,type); await fetchMsgs(cid,type); loadAll();
    }).subscribe();
};

window.goBack = () => {
  document.getElementById("sidebar").classList.remove("hide");
  CID=null;
};

function startPoll() {
  if (poll) clearInterval(poll);
  poll = setInterval(async()=>{
    await loadAll();
    if (CID) { await markSeen(CID,CTYPE); await fetchMsgs(CID,CTYPE); }
  }, 2500);
}

// ── FETCH MESSAGES ──────────────────────────────────────
async function fetchMsgs(cid, type) {
  let q = sb.from("messages").select("*").order("created_at",{ascending:true});
  q = type==='grp' ? q.eq("group_id",cid) : q.eq("conversation_id",cid).is("group_id",null);
  const { data: msgs } = await q;
  const el = document.getElementById("msgs");
  if (!el) return;
  const atBot = el.scrollHeight - el.scrollTop - el.clientHeight < 80;
  el.innerHTML = (msgs||[]).map(m => {
    const isMe = m.user_id===ME.id;
    const t = new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    const delMe = (m.deleted_for||[]).includes(ME.id);
    if (delMe||m.deleted_for_everyone) {
      return row(isMe,'<div class="bubble del">🚫 '+(m.deleted_for_everyone?'This message was deleted':'You deleted this message')+'</div>',t,'',m.sender_name,false,false);
    }
    let content;
    if (m.is_voice && m.voice_url) {
      content = '<div class="bubble"><div class="vbubble">' +
        '<button class="playbtn" onclick="playV(\''+m.id+'\',\''+ea(m.voice_url)+'\')">▶</button>' +
        '<div class="vbar" id="vb'+m.id+'"><div class="vprog" id="vp'+m.id+'"></div></div>' +
        '<span class="vdur" id="vd'+m.id+'">0:00</span>' +
      '</div></div>';
    } else {
      const edited = m.edited ? ' <span style="font-size:10px;color:#ffffff55">(edited)</span>' : '';
      content = '<div class="bubble" oncontextmenu="showCtx(event,\''+m.id+'\',\''+ea(m.text||'')+'\','+isMe+')" onclick="if(_m)showCtx(event,\''+m.id+'\',\''+ea(m.text||'')+'\','+isMe+')">'+eh(m.text||'')+edited+'</div>';
    }
    const seen=(m.seen_by||[]).length>0;
    const tick=isMe?(m.status==='sending'?'<span class="tick tclk">🕐</span>':seen?'<span class="tick tblue">✓✓</span>':'<span class="tick tgrey">✓✓</span>'):'';
    return row(isMe, content, t, tick, m.sender_name, isMe, type==='grp');
  }).join('');
  if (atBot) el.scrollTop = el.scrollHeight;
}

function row(isMe, content, t, tick, sender, showTick, showSender) {
  return '<div class="mrow '+(isMe?'me':'them')+'">' +
    '<div class="mwrap">' +
      (showSender&&!isMe?'<div class="msender">'+eh(sender||'')+'</div>':'') +
      content +
      '<div class="mmeta"><span class="mtime">'+t+'</span>'+(showTick?tick:'')+'</div>' +
    '</div></div>';
}

// ── MARK SEEN ───────────────────────────────────────────
async function markSeen(cid, type) {
  let q = sb.from("messages").select("id,seen_by").neq("user_id", ME.id);
  q = type==='grp' ? q.eq("group_id",cid) : q.eq("conversation_id",cid).is("group_id",null);
  const { data: msgs } = await q;
  if (!msgs) return;
  for (const m of msgs) {
    const s = m.seen_by||[];
    if (!s.includes(ME.id)) { s.push(ME.id); await sb.from("messages").update({seen_by:s}).eq("id",m.id); }
  }
}

// ── SEND ────────────────────────────────────────────────
window.onK = e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} };
window.autoH = el => { el.style.height="auto"; el.style.height=Math.min(el.scrollHeight,120)+"px"; };

window.sendMsg = async () => {
  const inp = document.getElementById("minp");
  const text = inp.value.trim();
  if (!text||!CID) return;
  if (editId) {
    await sb.from("messages").update({text,edited:true}).eq("id",editId);
    cancelEdit(); await fetchMsgs(CID,CTYPE); return;
  }
  inp.value=""; inp.style.height="auto";

  // optimistic bubble
  const tid="tmp"+Date.now();
  const el=document.getElementById("msgs");
  if(el){
    const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    const d=document.createElement("div"); d.className="mrow me"; d.id=tid;
    d.innerHTML='<div class="mwrap" style="align-items:flex-end"><div class="bubble">'+eh(text)+'</div><div class="mmeta" style="justify-content:flex-end"><span class="mtime">'+t+'</span><span class="tick tclk">🕐</span></div></div>';
    el.appendChild(d); el.scrollTop=el.scrollHeight;
  }
  await ins({text, status:'delivered', seen_by:[]});
  const tmp=document.getElementById(tid); if(tmp) tmp.remove();
  loadAll();
};

async function ins(extra={}) {
  const p={user_id:ME.id, sender_name:PROF?.name||ME.email, ...extra};
  if(CTYPE==='grp') p.group_id=CID; else p.conversation_id=CID;
  await sb.from("messages").insert(p);
  await fetchMsgs(CID,CTYPE);
}

// ── EDIT/DELETE ─────────────────────────────────────────
window._m = window.matchMedia("(pointer:coarse)").matches;
window.showCtx = (e,id,text,isMe) => {
  e.preventDefault(); if(!isMe) return;
  ctxId=id; ctxTxt=text;
  const m=document.getElementById("ctx"); m.style.display="block";
  m.style.left=Math.min(e.clientX||0,window.innerWidth-200)+"px";
  m.style.top=Math.min(e.clientY||0,window.innerHeight-100)+"px";
};
document.addEventListener("click",e=>{const m=document.getElementById("ctx");if(!m?.contains(e.target))m.style.display="none";});
window.ctxdo = a => {
  document.getElementById("ctx").style.display="none";
  if(a==="edit") startEdit(ctxId,ctxTxt);
  if(a==="delete"){delId=ctxId; document.getElementById("delModal").style.display="flex";}
};
function startEdit(id,text){
  editId=id;
  const inp=document.getElementById("minp"),bar=document.getElementById("ebar");
  if(!inp||!bar) return;
  inp.value=text; autoH(inp); inp.focus(); bar.style.display="flex";
  document.getElementById("sbtn").textContent="✓";
}
window.cancelEdit=()=>{
  editId=null;
  const inp=document.getElementById("minp"),bar=document.getElementById("ebar");
  if(inp){inp.value="";inp.style.height="auto";} if(bar) bar.style.display="none";
  const b=document.getElementById("sbtn"); if(b) b.textContent="➤";
};
window.doDelete = async scope => {
  hide("delModal"); if(!delId) return;
  if(scope==="all") {
    await sb.from("messages").update({deleted_for_everyone:true,text:"deleted"}).eq("id",delId);
  } else {
    const {data:m}=await sb.from("messages").select("deleted_for").eq("id",delId).single();
    const arr=m?.deleted_for||[]; if(!arr.includes(ME.id)) arr.push(ME.id);
    await sb.from("messages").update({deleted_for:arr}).eq("id",delId);
  }
  await fetchMsgs(CID,CTYPE); loadAll();
};

// ── VOICE RECORDING ─────────────────────────────────────
window.toggleRec = async () => {
  if(isRec){mrec.stop();return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    rchunks=[];
    mrec=new MediaRecorder(stream);
    mrec.ondataavailable=e=>rchunks.push(e.data);
    mrec.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop()); isRec=false;
      document.getElementById("vbtn").classList.remove("rec");
      document.getElementById("vbtn").textContent="🎤";
      const blob=new Blob(rchunks,{type:'audio/webm'});
      const fname='v'+ME.id+Date.now()+'.webm';
      const {data:up}=await sb.storage.from('voices').upload(fname,blob,{contentType:'audio/webm'});
      if(up){
        const {data:ud}=sb.storage.from('voices').getPublicUrl(fname);
        await ins({is_voice:true,voice_url:ud.publicUrl,text:'🎤 Voice message',status:'delivered',seen_by:[]});
      }
    };
    mrec.start(); isRec=true;
    document.getElementById("vbtn").classList.add("rec");
    document.getElementById("vbtn").textContent="⏹";
  }catch(e){alert("Mic access denied: "+e.message);}
};

// ── VOICE PLAYBACK ───────────────────────────────────────
const AUD={};
window.playV=(id,url)=>{
  if(AUD[id]){AUD[id].paused?AUD[id].play():AUD[id].pause();return;}
  const a=new Audio(url); AUD[id]=a;
  a.ontimeupdate=()=>{
    const pct=a.duration?(a.currentTime/a.duration*100):0;
    const p=document.getElementById("vp"+id),d=document.getElementById("vd"+id);
    if(p) p.style.width=pct+"%"; if(d) d.textContent=fmt(a.currentTime);
  };
  a.onended=()=>{const p=document.getElementById("vp"+id);if(p)p.style.width="0%";};
  a.onplay=()=>{ const b=document.querySelector('#vb'+id+' .playbtn'); if(b) b.textContent="⏸"; };
  a.onpause=()=>{ const b=document.querySelector('#vb'+id+' .playbtn'); if(b) b.textContent="▶"; };
  a.play();
};

// ── NEW DM ───────────────────────────────────────────────
window.openNewChat=()=>{
  document.getElementById("dmEmail").value=""; document.getElementById("dmerr").textContent="";
  document.getElementById("dmModal").style.display="flex";
  setTimeout(()=>document.getElementById("dmEmail").focus(),100);
};
window.startDM=async()=>{
  const email=document.getElementById("dmEmail").value.trim().toLowerCase();
  const err=document.getElementById("dmerr"); err.textContent="";
  if(!email){err.textContent="Enter an email.";return;}
  if(email===(ME.email||"").toLowerCase()){err.textContent="That's your own email!";return;}
  const {data:f}=await sb.from("users").select("*").eq("email",email).single();
  if(!f){err.textContent="User not found. They need to sign up first!";return;}
  const {data:mc}=await sb.from("conversation_members").select("conversation_id").eq("user_id",ME.id);
  const {data:tc}=await sb.from("conversation_members").select("conversation_id").eq("user_id",f.id);
  const mids=(mc||[]).map(x=>x.conversation_id);
  const tids=(tc||[]).map(x=>x.conversation_id);
  const common=mids.find(id=>tids.includes(id));
  hide("dmModal");
  if(common){switchTab('dm');await openChat(common,f.name,'dm');return;}
  const {data:cv}=await sb.from("conversations").insert({}).select().single();
  await sb.from("conversation_members").insert([{conversation_id:cv.id,user_id:ME.id},{conversation_id:cv.id,user_id:f.id}]);
  switchTab('dm'); await loadAll(); await openChat(cv.id,f.name,'dm');
};

// ── NEW GROUP ────────────────────────────────────────────
window.openNewGroup=()=>{
  grpMems=[]; document.getElementById("gname").value=""; document.getElementById("gemail").value=""; document.getElementById("gerr").textContent=""; document.getElementById("tagwrap").innerHTML="";
  document.getElementById("grpModal").style.display="flex";
  setTimeout(()=>document.getElementById("gname").focus(),100);
};
window.addMember=async()=>{
  const email=document.getElementById("gemail").value.trim().toLowerCase();
  const err=document.getElementById("gerr"); err.textContent="";
  if(!email) return;
  if(email===(ME.email||"").toLowerCase()){err.textContent="That's you!";return;}
  if(grpMems.find(m=>m.email===email)){err.textContent="Already added.";return;}
  const {data:f}=await sb.from("users").select("*").eq("email",email).single();
  if(!f){err.textContent="User not found!";return;}
  grpMems.push(f); document.getElementById("gemail").value=""; renderTags();
};
function renderTags(){
  document.getElementById("tagwrap").innerHTML=grpMems.map((m,i)=>'<div class="tag">'+eh(m.name)+' <button onclick="remMem('+i+')">×</button></div>').join('');
}
window.remMem=i=>{grpMems.splice(i,1);renderTags();};
window.createGrp=async()=>{
  const name=document.getElementById("gname").value.trim();
  const err=document.getElementById("gerr"); err.textContent="";
  if(!name){err.textContent="Enter group name.";return;}
  if(!grpMems.length){err.textContent="Add at least 1 member.";return;}
  const {data:g}=await sb.from("groups").insert({name,created_by:ME.id}).select().single();
  await sb.from("group_members").insert([ME.id,...grpMems.map(m=>m.id)].map(uid=>({group_id:g.id,user_id:uid})));
  hide("grpModal"); switchTab('grp'); await loadAll(); await openChat(g.id,name,'grp');
};

// ── UTILS ────────────────────────────────────────────────
window.hide=id=>document.getElementById(id).style.display="none";
function eh(t){return String(t||'').replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");}
function ea(t){return String(t||'').replace(/\\/g,"\\\\").replace(/'/g,"&#39;").replace(/"/g,"&quot;");}
function ago(d){const s=Math.floor((Date.now()-d)/1000);if(s<60)return "now";if(s<3600)return Math.floor(s/60)+"m";if(s<86400)return Math.floor(s/3600)+"h";return Math.floor(s/86400)+"d";}
function fmt(s){return Math.floor(s/60)+":"+(Math.floor(s%60)+"").padStart(2,"0");}
</script>
