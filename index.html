<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatApp</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; height: 100vh; display: flex; overflow: hidden; }
  #authScreen { flex: 1; display: flex; align-items: center; justify-content: center; }
  .auth-box { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px; padding: 40px 36px; width: 340px; text-align: center; }
  .auth-box h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
  .auth-box p { color: #888; font-size: 14px; margin-bottom: 24px; }
  .auth-input { width: 100%; background: #2a2a2a; border: 1px solid #333; border-radius: 12px; padding: 12px 16px; color: #fff; font-size: 15px; outline: none; margin-bottom: 10px; transition: border-color 0.2s; }
  .auth-input:focus { border-color: #7c3aed; }
  .auth-input::placeholder { color: #555; }
  .btn-primary { width: 100%; background: #7c3aed; border: none; color: #fff; padding: 13px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
  .btn-primary:hover { background: #6d28d9; }
  .auth-error { color: #f87171; font-size: 13px; margin-top: 4px; min-height: 20px; }
  .auth-toggle { color: #888; font-size: 13px; margin-top: 14px; }
  .auth-toggle span { color: #a78bfa; cursor: pointer; text-decoration: underline; }
  #appScreen { display: none; flex: 1; height: 100vh; }
  .app { display: flex; height: 100vh; width: 100%; }
  .sidebar { width: 280px; background: #1a1a1a; border-right: 1px solid #2a2a2a; display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 14px 16px; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; gap: 10px; }
  .my-avatar { width: 36px; height: 36px; border-radius: 50%; background: #7c3aed; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .my-name { font-size: 14px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .logout-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 18px; }
  .logout-btn:hover { color: #aaa; }
  .new-chat-btn { margin: 12px; background: #7c3aed22; border: 1px dashed #7c3aed66; color: #a78bfa; border-radius: 10px; padding: 10px; font-size: 13px; cursor: pointer; text-align: center; transition: background 0.15s; }
  .new-chat-btn:hover { background: #7c3aed33; }
  .contacts { flex: 1; overflow-y: auto; }
  .contact { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; border-radius: 10px; margin: 2px 8px; transition: background 0.15s; }
  .contact:hover { background: #252525; }
  .contact.active { background: #7c3aed22; }
  .c-avatar { width: 40px; height: 40px; border-radius: 50%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; flex-shrink: 0; }
  .c-info { flex: 1; min-width: 0; }
  .c-name { font-size: 14px; font-weight: 600; }
  .c-preview { font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .chat-area { flex: 1; display: flex; flex-direction: column; background: #111; }
  .chat-header { padding: 14px 20px; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; gap: 12px; background: #1a1a1a; }
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 4px; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
  .msg-row { display: flex; align-items: flex-end; gap: 8px; position: relative; padding: 2px 0; }
  .msg-row.me { flex-direction: row-reverse; }
  .msg-wrap { display: flex; flex-direction: column; max-width: 65%; position: relative; }
  .msg-row.me .msg-wrap { align-items: flex-end; }
  .bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; word-break: break-word; position: relative; cursor: pointer; }
  .msg-row.them .bubble { background: #2a2a2a; border-bottom-left-radius: 4px; }
  .msg-row.me .bubble { background: #7c3aed; border-bottom-right-radius: 4px; }
  .bubble.deleted { background: #1e1e1e !important; color: #555; font-style: italic; border: 1px dashed #333; cursor: default; }
  .bubble.edited-bubble::after { content: " (edited)"; font-size: 10px; color: #aaa8; }
  .msg-sender { font-size: 11px; color: #888; margin-bottom: 3px; }

  /* Message time + tick row */
  .msg-meta { display: flex; align-items: center; gap: 4px; margin-top: 3px; }
  .msg-row.me .msg-meta { justify-content: flex-end; }
  .msg-row.them .msg-meta { justify-content: flex-start; }
  .msg-time-txt { font-size: 10px; color: #555; }
  .tick { font-size: 13px; line-height: 1; display: inline-flex; align-items: center; }
  .tick.clock { color: #666; font-size: 11px; }
  .tick.sent { color: #888; }
  .tick.delivered { color: #888; }
  .tick.seen { color: #60a5fa; }

  /* Context menu */
  .ctx-menu { position: fixed; background: #222; border: 1px solid #333; border-radius: 12px; padding: 6px; z-index: 999; min-width: 180px; box-shadow: 0 8px 32px #0008; animation: fadeIn 0.12s ease; }
  @keyframes fadeIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
  .ctx-item { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: background 0.12s; }
  .ctx-item:hover { background: #2e2e2e; }
  .ctx-item.danger { color: #f87171; }
  .ctx-item.danger:hover { background: #f8717122; }
  .ctx-icon { font-size: 16px; width: 20px; text-align: center; }
  .edit-bar { background: #1e1a2e; border-top: 2px solid #7c3aed; padding: 8px 16px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: #a78bfa; }
  .edit-bar-cancel { background: none; border: none; color: #888; cursor: pointer; font-size: 18px; margin-left: auto; }
  .input-area { padding: 14px 20px; border-top: 1px solid #2a2a2a; background: #1a1a1a; display: flex; gap: 10px; align-items: center; }
  .input-box { flex: 1; background: #2a2a2a; border: 1px solid #333; border-radius: 24px; padding: 10px 18px; color: #fff; font-size: 14px; outline: none; font-family: inherit; resize: none; max-height: 100px; transition: border-color 0.2s; }
  .input-box:focus { border-color: #7c3aed; }
  .input-box::placeholder { color: #555; }
  .send-btn { background: #7c3aed; border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
  .send-btn:hover { background: #6d28d9; }
  .empty-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; gap: 10px; }
  .empty-chat .icon { font-size: 48px; }
  .modal-overlay { position: fixed; inset: 0; background: #000a; display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; padding: 28px; width: 320px; }
  .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .modal-error { color: #f87171; font-size: 13px; margin-top: 6px; min-height: 18px; }
  .modal-btns { display: flex; gap: 10px; margin-top: 16px; }
  .modal-btns button { flex: 1; padding: 10px; border-radius: 10px; font-size: 14px; cursor: pointer; border: none; font-weight: 600; }
  .btn-cancel { background: #2a2a2a; color: #aaa; }
  .btn-confirm { background: #7c3aed; color: #fff; }
  .btn-danger { background: #ef4444; color: #fff; }
  @media (max-width: 580px) {
    .sidebar { width: 66px; }
    .c-info, .my-name, .new-chat-btn { display: none; }
    .contact { justify-content: center; padding: 10px 0; }
    .sidebar-header { justify-content: space-between; padding: 10px 8px; }
    .new-chat-mobile { display: flex !important; }
  }
  .new-chat-mobile { display: none; background: #7c3aed; border: none; color: #fff; width: 32px; height: 32px; border-radius: 50%; font-size: 20px; cursor: pointer; align-items: center; justify-content: center; }
</style>
</head>
<body>

<div id="authScreen">
  <div class="auth-box">
    <h1>💬 ChatApp</h1>
    <p id="authSub">Sign in to chat with friends</p>
    <input class="auth-input" id="authName" type="text" placeholder="Display name" style="display:none">
    <input class="auth-input" id="authEmail" type="email" placeholder="Email address">
    <input class="auth-input" id="authPass" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')doAuth()">
    <button class="btn-primary" onclick="doAuth()" id="authBtn">Sign In</button>
    <div class="auth-error" id="authError"></div>
    <div class="auth-toggle" id="authToggle">Don't have an account? <span onclick="toggleAuth()">Sign Up</span></div>
  </div>
</div>

<div id="appScreen">
  <div class="app">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="my-avatar" id="myAvatar">?</div>
        <div class="my-name" id="myName"></div>
        <button class="new-chat-mobile" onclick="openModal()">+</button>
        <button class="logout-btn" onclick="doLogout()" title="Sign out">🚪</button>
      </div>
      <div class="new-chat-btn" onclick="openModal()">+ New Conversation</div>
      <div class="contacts" id="contactList">
        <div style="padding:20px;text-align:center;color:#555;font-size:13px">No conversations yet</div>
      </div>
    </div>
    <div class="chat-area" id="chatArea">
      <div class="empty-chat">
        <div class="icon">💬</div>
        <p>Select a conversation</p>
        <p style="font-size:13px;color:#555">or start a new one above</p>
      </div>
    </div>
  </div>
</div>

<!-- New Chat Modal -->
<div class="modal-overlay" id="newChatModal" style="display:none">
  <div class="modal">
    <h3>Start Conversation</h3>
    <input class="auth-input" id="friendEmail" type="email" placeholder="Friend's email address" onkeydown="if(event.key==='Enter')startChat()">
    <div class="modal-error" id="modalError"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="startChat()">Start Chat</button>
    </div>
  </div>
</div>

<!-- Delete Modal -->
<div class="modal-overlay" id="deleteModal" style="display:none">
  <div class="modal">
    <h3>🗑️ Delete Message</h3>
    <p style="color:#aaa;font-size:14px;margin-bottom:8px">How do you want to delete?</p>
    <div class="modal-btns" style="flex-direction:column;gap:8px">
      <button class="btn-danger" onclick="confirmDelete('everyone')" style="padding:12px">🌐 Delete for Everyone</button>
      <button class="btn-confirm" onclick="confirmDelete('me')" style="background:#333;padding:12px">🙈 Delete for Me Only</button>
      <button class="btn-cancel" onclick="closeDeleteModal()" style="padding:12px">Cancel</button>
    </div>
  </div>
</div>

<!-- Context Menu -->
<div class="ctx-menu" id="ctxMenu" style="display:none">
  <div class="ctx-item" onclick="ctxAction('edit')"><span class="ctx-icon">✏️</span> Edit Message</div>
  <div class="ctx-item danger" onclick="ctxAction('delete')"><span class="ctx-icon">🗑️</span> Delete Message</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://mqomxdvydrnnvvkkabtz.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xb214ZHZ5ZHJubnZ2a2thYnR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjI1MzksImV4cCI6MjA5Njk5ODUzOX0.TMh3pjoVeQ0U14mhwbE_-9YHnS3t2_kSd6ThJ3t1A2M";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let me = null, myProfile = null, activeConvoId = null, msgSub = null, isSignUp = false;
let ctxMsgId = null, ctxMsgText = null, editingMsgId = null;

// ---- TICK HELPER ----
function tickIcon(msg, isMe) {
  if (!isMe) return '';
  const status = msg.status || 'sending';
  const seenBy = msg.seen_by || [];
  const isSeen = seenBy.length > 0;

  if (status === 'sending') return `<span class="tick clock" title="Sending">🕐</span>`;
  if (status === 'sent') return `<span class="tick sent" title="Sent">✓</span>`;
  if (status === 'delivered' && !isSeen) return `<span class="tick delivered" title="Delivered">✓✓</span>`;
  if (isSeen) return `<span class="tick seen" title="Seen">✓✓</span>`;
  return `<span class="tick sent">✓</span>`;
}

// ---- AUTH ----
window.toggleAuth = () => {
  isSignUp = !isSignUp;
  document.getElementById("authName").style.display = isSignUp ? "block" : "none";
  document.getElementById("authBtn").textContent = isSignUp ? "Create Account" : "Sign In";
  document.getElementById("authSub").textContent = isSignUp ? "Create your account" : "Sign in to chat with friends";
  document.getElementById("authToggle").innerHTML = isSignUp
    ? `Already have an account? <span onclick="toggleAuth()">Sign In</span>`
    : `Don't have an account? <span onclick="toggleAuth()">Sign Up</span>`;
  document.getElementById("authError").textContent = "";
};

window.doAuth = async () => {
  const email = document.getElementById("authEmail").value.trim();
  const pass = document.getElementById("authPass").value;
  const name = document.getElementById("authName").value.trim();
  const errEl = document.getElementById("authError");
  errEl.textContent = "";
  if (!email || !pass) { errEl.textContent = "Please fill in all fields."; return; }
  if (isSignUp) {
    if (!name) { errEl.textContent = "Please enter a display name."; return; }
    const { data, error } = await sb.auth.signUp({ email, password: pass });
    if (error) { errEl.textContent = error.message; return; }
    await sb.from("users").insert({ id: data.user.id, email, name });
    await loadApp(data.user);
  } else {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) { errEl.textContent = error.message; return; }
    await loadApp(data.user);
  }
};

window.doLogout = async () => {
  if (msgSub) sb.removeChannel(msgSub);
  await sb.auth.signOut();
  me = null; myProfile = null; activeConvoId = null;
  document.getElementById("authScreen").style.display = "flex";
  document.getElementById("appScreen").style.display = "none";
};

sb.auth.getSession().then(({ data }) => { if (data.session) loadApp(data.session.user); });

async function loadApp(user) {
  me = user;
  const { data: profile } = await sb.from("users").select("*").eq("id", user.id).single();
  myProfile = profile;
  document.getElementById("authScreen").style.display = "none";
  document.getElementById("appScreen").style.display = "flex";
  const initials = (profile?.name || user.email).slice(0,2).toUpperCase();
  document.getElementById("myAvatar").textContent = initials;
  document.getElementById("myName").textContent = profile?.name || user.email;
  loadConversations();
}

// ---- CONVERSATIONS ----
async function loadConversations() {
  const { data: myConvos } = await sb.from("conversation_members").select("conversation_id").eq("user_id", me.id);
  if (!myConvos || !myConvos.length) {
    document.getElementById("contactList").innerHTML = `<div style="padding:20px;text-align:center;color:#555;font-size:13px">No conversations yet.<br>Start one above!</div>`;
    return;
  }
  const ids = myConvos.map(c => c.conversation_id);
  const { data: members } = await sb.from("conversation_members").select("conversation_id, user_id, users(name, email)").in("conversation_id", ids).neq("user_id", me.id);
  const convos = [];
  for (const id of ids) {
    const { data: lastMsg } = await sb.from("messages").select("text, created_at, deleted_for_everyone").eq("conversation_id", id).order("created_at", { ascending: false }).limit(1);
    const member = members?.find(m => m.conversation_id === id);
    if (member) {
      const lm = lastMsg?.[0];
      convos.push({ id, otherName: member.users?.name || member.users?.email || "Unknown", lastMsg: lm?.deleted_for_everyone ? "🚫 Message deleted" : (lm?.text || "No messages yet"), lastAt: lm?.created_at });
    }
  }
  convos.sort((a,b) => new Date(b.lastAt||0) - new Date(a.lastAt||0));
  document.getElementById("contactList").innerHTML = convos.map(c => `
    <div class="contact ${c.id===activeConvoId?'active':''}" onclick="openConvo('${c.id}','${escAttr(c.otherName)}')">
      <div class="c-avatar">${c.otherName.slice(0,2).toUpperCase()}</div>
      <div class="c-info"><div class="c-name">${escHtml(c.otherName)}</div><div class="c-preview">${escHtml(c.lastMsg)}</div></div>
    </div>`).join('');
}

// ---- OPEN CONVO ----
window.openConvo = async (convoId, otherName) => {
  activeConvoId = convoId;
  editingMsgId = null;
  if (msgSub) sb.removeChannel(msgSub);

  document.getElementById("chatArea").innerHTML = `
    <div class="chat-header">
      <div style="width:34px;height:34px;border-radius:50%;background:#2a2a2a;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px">${otherName.slice(0,2).toUpperCase()}</div>
      <h3 style="font-size:15px;font-weight:600;margin-left:4px">${escHtml(otherName)}</h3>
    </div>
    <div class="messages" id="msgList"></div>
    <div id="editBar" style="display:none" class="edit-bar">
      <span>✏️ Editing message</span>
      <button class="edit-bar-cancel" onclick="cancelEdit()">✕</button>
    </div>
    <div class="input-area">
      <textarea class="input-box" id="msgInput" placeholder="Message ${escHtml(otherName)}…" rows="1" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()">➤</button>
    </div>`;

  const inp = document.getElementById("msgInput");
  inp.addEventListener("input", () => { inp.style.height="auto"; inp.style.height=Math.min(inp.scrollHeight,100)+"px"; });
  inp.focus();

  // mark messages as seen when opening chat
  await markSeen(convoId);
  await fetchMessages(convoId);

  msgSub = sb.channel('msgs-'+convoId)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'messages', filter: `conversation_id=eq.${convoId}` }, async () => {
      await markSeen(convoId);
      await fetchMessages(convoId);
    })
    .subscribe();

  loadConversations();
};

// ---- MARK SEEN ----
async function markSeen(convoId) {
  // get all messages not sent by me and not yet seen by me
  const { data: msgs } = await sb.from("messages")
    .select("id, seen_by")
    .eq("conversation_id", convoId)
    .neq("user_id", me.id);

  if (!msgs) return;
  for (const msg of msgs) {
    const seen = msg.seen_by || [];
    if (!seen.includes(me.id)) {
      seen.push(me.id);
      await sb.from("messages").update({ seen_by: seen }).eq("id", msg.id);
    }
  }
}

// ---- FETCH MESSAGES ----
async function fetchMessages(convoId) {
  const { data: msgs } = await sb.from("messages").select("*").eq("conversation_id", convoId).order("created_at", { ascending: true });
  const list = document.getElementById("msgList");
  if (!list) return;
  const wasAtBottom = list.scrollHeight - list.scrollTop - list.clientHeight < 60;

  list.innerHTML = (msgs||[]).map(m => {
    const isMe = m.user_id === me.id;
    const t = new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    const deletedForMe = (m.deleted_for||[]).includes(me.id);
    const deletedForAll = m.deleted_for_everyone;

    if (deletedForMe || deletedForAll) {
      return `<div class="msg-row ${isMe?'me':'them'}">
        <div class="msg-wrap">
          <div class="bubble deleted">🚫 ${deletedForAll ? 'This message was deleted' : 'You deleted this message'}</div>
          <div class="msg-meta"><span class="msg-time-txt">${t}</span></div>
        </div>
      </div>`;
    }

    const tick = tickIcon(m, isMe);
    return `<div class="msg-row ${isMe?'me':'them'}" id="row-${m.id}">
      <div class="msg-wrap">
        ${!isMe ? `<div class="msg-sender">${escHtml(m.sender_name||'')}</div>` : ''}
        <div class="bubble ${m.edited?'edited-bubble':''}" oncontextmenu="showCtx(event,'${m.id}','${escAttr(m.text)}',${isMe})">${escHtml(m.text)}</div>
        <div class="msg-meta">
          <span class="msg-time-txt">${t}</span>
          ${m.edited ? `<span style="font-size:10px;color:#666">edited</span>` : ''}
          ${tick}
        </div>
      </div>
    </div>`;
  }).join('');

  if (wasAtBottom) list.scrollTop = list.scrollHeight;
}

// ---- CONTEXT MENU ----
window.showCtx = (e, msgId, msgText, isMe) => {
  e.preventDefault();
  if (!isMe) return;
  ctxMsgId = msgId; ctxMsgText = msgText;
  const menu = document.getElementById("ctxMenu");
  menu.style.display = "block";
  const x = Math.min(e.clientX, window.innerWidth - 200);
  const y = Math.min(e.clientY, window.innerHeight - 110);
  menu.style.left = x+"px"; menu.style.top = y+"px";
};
document.addEventListener("click", e => { const m = document.getElementById("ctxMenu"); if(!m.contains(e.target)) m.style.display="none"; });
window.ctxAction = (action) => {
  document.getElementById("ctxMenu").style.display = "none";
  if (action==="edit") startEdit(ctxMsgId, ctxMsgText);
  if (action==="delete") openDeleteModal();
};

// ---- EDIT ----
function startEdit(msgId, msgText) {
  editingMsgId = msgId;
  const inp = document.getElementById("msgInput");
  const bar = document.getElementById("editBar");
  if (!inp||!bar) return;
  inp.value = msgText; inp.style.height="auto"; inp.style.height=Math.min(inp.scrollHeight,100)+"px"; inp.focus();
  bar.style.display="flex";
  document.getElementById("sendBtn").textContent="✓";
}
window.cancelEdit = () => {
  editingMsgId=null;
  const inp=document.getElementById("msgInput"); const bar=document.getElementById("editBar");
  if(inp){inp.value="";inp.style.height="auto";} if(bar) bar.style.display="none";
  const btn=document.getElementById("sendBtn"); if(btn) btn.textContent="➤";
};

// ---- DELETE ----
window.openDeleteModal = () => { document.getElementById("deleteModal").style.display="flex"; };
window.closeDeleteModal = () => { document.getElementById("deleteModal").style.display="none"; };
window.confirmDelete = async (scope) => {
  closeDeleteModal();
  if (!ctxMsgId) return;
  if (scope==="everyone") {
    await sb.from("messages").update({ deleted_for_everyone:true, text:"deleted" }).eq("id", ctxMsgId);
  } else {
    const { data: msg } = await sb.from("messages").select("deleted_for").eq("id", ctxMsgId).single();
    const arr = msg?.deleted_for||[];
    if (!arr.includes(me.id)) arr.push(me.id);
    await sb.from("messages").update({ deleted_for:arr }).eq("id", ctxMsgId);
  }
  await fetchMessages(activeConvoId);
  loadConversations();
};

// ---- SEND ----
window.handleKey = e => { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();} };
window.sendMsg = async () => {
  const inp = document.getElementById("msgInput");
  const text = inp.value.trim();
  if (!text||!activeConvoId) return;

  if (editingMsgId) {
    await sb.from("messages").update({ text, edited:true }).eq("id", editingMsgId);
    cancelEdit();
    await fetchMessages(activeConvoId);
    return;
  }

  inp.value=""; inp.style.height="auto";

  // optimistic: show with clock immediately
  const tempId = "temp-"+Date.now();
  const list = document.getElementById("msgList");
  if (list) {
    const t = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    const div = document.createElement("div");
    div.className = "msg-row me"; div.id = tempId;
    div.innerHTML = `<div class="msg-wrap" style="align-items:flex-end">
      <div class="bubble">${escHtml(text)}</div>
      <div class="msg-meta" style="justify-content:flex-end"><span class="msg-time-txt">${t}</span><span class="tick clock">🕐</span></div>
    </div>`;
    list.appendChild(div);
    list.scrollTop = list.scrollHeight;
  }

  const { error } = await sb.from("messages").insert({
    conversation_id: activeConvoId, user_id: me.id,
    sender_name: myProfile?.name || me.email,
    text, status: 'delivered', seen_by: []
  });

  // remove optimistic bubble (real one comes via subscription)
  const tmp = document.getElementById(tempId);
  if (tmp) tmp.remove();

  if (!error) loadConversations();
};

// ---- NEW CHAT ----
window.openModal = () => {
  document.getElementById("newChatModal").style.display="flex";
  document.getElementById("friendEmail").value="";
  document.getElementById("modalError").textContent="";
  setTimeout(()=>document.getElementById("friendEmail").focus(),100);
};
window.closeModal = () => { document.getElementById("newChatModal").style.display="none"; };
window.startChat = async () => {
  const email = document.getElementById("friendEmail").value.trim().toLowerCase();
  const errEl = document.getElementById("modalError");
  errEl.textContent="";
  if (!email) { errEl.textContent="Please enter an email."; return; }
  if (email===me.email.toLowerCase()) { errEl.textContent="That's your own email!"; return; }
  const { data: friend } = await sb.from("users").select("*").eq("email", email).single();
  if (!friend) { errEl.textContent="No user found! They need to sign up first."; return; }
  const { data: myC } = await sb.from("conversation_members").select("conversation_id").eq("user_id", me.id);
  const { data: theirC } = await sb.from("conversation_members").select("conversation_id").eq("user_id", friend.id);
  const myIds=(myC||[]).map(x=>x.conversation_id);
  const theirIds=(theirC||[]).map(x=>x.conversation_id);
  const common=myIds.find(id=>theirIds.includes(id));
  if (common) { closeModal(); openConvo(common, friend.name); return; }
  const { data: convo } = await sb.from("conversations").insert({}).select().single();
  await sb.from("conversation_members").insert([{conversation_id:convo.id,user_id:me.id},{conversation_id:convo.id,user_id:friend.id}]);
  closeModal();
  openConvo(convo.id, friend.name);
};

function escHtml(t){return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");}
function escAttr(t){return String(t).replace(/\\/g,"\\\\").replace(/'/g,"&#39;").replace(/"/g,"&quot;");}
</script>
</body>
</html>
